<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocopuff | Secure Executive Admin</title>
    <!-- Font families matching your brand architecture -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for professional UI dashboard elements -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --chocolate-main: #8b5c1a;
            --chocolate-dark: #5c3a21;
            --cream-bg: #fffcf7;
            --white: #ffffff;
            --blurple: #7289da;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--cream-bg);
            color: var(--chocolate-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ==========================================================
           1. CORE ANIMATION TIMING DEFINITIONS
           ========================================================== */
        @keyframes zoomFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes welcomeCardPop {
            0% { opacity: 0; transform: scale(0.7); filter: blur(10px); }
            70% { transform: scale(1.05); filter: blur(0); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes subtleGlow {
            from { box-shadow: 0 8px 32px rgba(139,92,26,0.1); }
            to { box-shadow: 0 8px 32px rgba(139,92,26,0.25); }
        }
        @keyframes tableRowEntrance {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================================
           2. AUTHENTICATION MODULE SCREEN VIEWPORT
           ========================================================== */
        .auth-viewport {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-card {
            background: var(--white);
            padding: 40px 30px;
            border-radius: 24px;
            border: 3px solid var(--chocolate-main);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(139,92,26,0.15);
            animation: zoomFadeIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .auth-card i.lock-icon {
            font-size: 3rem;
            color: var(--chocolate-main);
            margin-bottom: 15px;
        }

        .auth-card h2 {
            font-family: 'Fredoka One', sans-serif;
            color: var(--chocolate-main);
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }

        .auth-card p {
            color: #7a6252;
            margin: 0 0 25px 0;
            font-weight: 600;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a69285;
            transition: color 0.2s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid rgba(139,92,26,0.2);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            background-color: #fffdfb;
            color: var(--chocolate-dark);
            transition: all 0.2s ease-in-out;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--chocolate-main);
            box-shadow: 0 0 0 4px rgba(139,92,26,0.1);
        }

        .input-group input:focus + i {
            color: var(--chocolate-main);
        }

        .login-btn {
            width: 100%;
            background-color: var(--chocolate-main);
            color: var(--white);
            border: none;
            padding: 14px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 12px rgba(139,92,26,0.2);
        }

        .login-btn:hover {
            background-color: var(--chocolate-dark);
            transform: translateY(-1px);
        }

        /* ==========================================================
           3. CINEMATIC INTERMEDIARY SPLASH WELCOME OVERLAY
           ========================================================== */
        .welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--cream-bg);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* The Profile picture initial center state animation layout */
        .welcome-avatar-wrapper {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 6px solid var(--chocolate-main);
            background: var(--white);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 32px rgba(139,92,26,0.15);
            animation: welcomeCardPop 0.60s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: all 0.85s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .welcome-avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .welcome-avatar-wrapper i {
            font-size: 5rem;
            color: var(--chocolate-main);
        }

        .welcome-text {
            margin-top: 25px;
            text-align: center;
            transition: all 0.75s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .welcome-text h2 {
            font-family: 'Fredoka One', sans-serif;
            color: var(--chocolate-main);
            font-size: 2.2rem;
            margin: 0 0 5px 0;
        }

        .welcome-text p {
            font-size: 1.2rem;
            color: #7a6252;
            margin: 0;
            font-weight: 700;
        }

        /* ==========================================================
           4. SYSTEM MASTER WORKSPACE DASHBOARD CONTENT
           ========================================================== */
        .dashboard-viewport {
            max-width: 1300px;
            margin: 0 auto;
            padding: 120px 25px 40px 25px; /* Pushed down to clear the animated banner header context */
            box-sizing: border-box;
            opacity: 0;
            display: none;
            transition: opacity 0.6s ease-out;
        }

        /* Dynamic Header banner containing the shifted profile data */
        .dynamic-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 90px;
            background: rgba(255, 252, 247, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(139,92,26,0.15);
            z-index: 998;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 35px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }

        .profile-brand-cluster {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .refresh-btn {
            background-color: var(--chocolate-main);
            color: var(--white);
            border: none;
            padding: 12px 22px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: 'Quicksand', sans-serif;
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(139,92,26,0.1);
        }

        .refresh-btn:hover {
            background-color: var(--chocolate-dark);
            transform: translateY(-1px);
        }

        /* Modern Data Grid Display Tables */
        .table-wrapper {
            background: var(--white);
            border-radius: 24px;
            border: 3px solid var(--chocolate-main);
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(139,92,26,0.06);
            animation: subtleGlow 2s ease-in-out alternate infinite;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--chocolate-main);
            color: var(--white);
            font-weight: 700;
            font-size: 1.05rem;
            padding: 18px 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid rgba(139,92,26,0.1);
            vertical-align: top;
            font-size: 1rem;
            color: var(--chocolate-dark);
        }

        tr {
            opacity: 0; /* Animated dynamically line-by-line via loop indices */
        }

        tr:last-child td {
            border-bottom: none;
        }

        .order-id-tag {
            background: #f4eae1;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            color: var(--chocolate-dark);
            border: 1px solid rgba(139,92,26,0.15);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .status-preparing { background-color: #ffe6cc; color: #b35900; }
        .status-delivery { background-color: #d1e7dd; color: #0f5132; }

        .item-badge-list {
            margin: 0; padding: 0; list-style-type: none;
        }
        .item-badge-list li {
            background: var(--cream-bg);
            border: 1px solid rgba(139,92,26,0.1);
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- ==========================================================
       VIEWPORT 1: LOGIN APPLICATION PANEL
       ========================================================== -->
    <div id="authViewport" class="auth-viewport">
        <div class="auth-card">
            <i class="fa-solid fa-cookie-bite lock-icon"></i>
            <h2>Chocopuff Admin</h2>
            <p>Access database records index parameters.</p>
            
            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="input-group">
                    <input type="text" id="usernameInput" placeholder="Username" required autocomplete="username">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder="Password" required autocomplete="current-password">
                    <i class="fa-solid fa-key"></i>
                </div>
                <button type="submit" class="login-btn">Secure Login</button>
            </form>
        </div>
    </div>

    <!-- ==========================================================
       VIEWPORT 2: SPLASH SYSTEM TRANSITION OVERLAY
       ========================================================== -->
    <div id="welcomeOverlay" class="welcome-overlay">
        <div id="welcomeAvatar" class="welcome-avatar-wrapper">
            <!-- Dynamic placeholder images will load safely here via JavaScript logic -->
        </div>
        <div id="welcomeText" class="welcome-text">
            <!-- Intercepted dynamic welcome layout arrays append here -->
        </div>
    </div>

    <!-- ==========================================================
       VIEWPORT 3: DYNAMIC BRAND BANNER HEADER
       ========================================================== -->
    <div id="dynamicHeader" class="dynamic-header">
        <div id="headerBrandCluster" class="profile-brand-cluster">
            <!-- Elements travel smoothly up into this context box automatically -->
        </div>
        <button class="refresh-btn" onclick="fetchOrderDatabase()"><i class="fa-solid fa-rotate"></i> Sync Live Data</button>
    </div>

    <!-- ==========================================================
       VIEWPORT 4: PRIMARY CONTROL WORKSPACE DATA GRID
       ========================================================== -->
    <div id="dashboardViewport" class="dashboard-viewport">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID Reference</th>
                        <th>Profile Account</th>
                        <th>Logistics Coordinates</th>
                        <th>Manifest Request</th>
                        <th>Financial Settlement</th>
                        <th>System State</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <!-- Iterated JSON data nodes inject recursively -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- ==========================================================
       CORE ANIMATION COMPILER SCRIPTS LAYER
       ========================================================== -->
    <script>
        // Adjust this string accurately to match your production Render backend URL domain completely
        const CHOCOPUFF_SMS_API_BASE = "https://chocopuff-sms-backend.onrender.com"; 
        let activeSessionToken = "";

        // Profile metadata configs
        const profiles = {
            TristanAmadeo: {
                name: "Tristan Amadeo",
                title: "CEO & Founder",
                // Profile Avatar: Uses high-res visual placeholder (Or replace with your direct image link)
                avatar: "Tristan.jpg"
            },
            JamesHilado: {
                name: "James Hilado",
                title: "COO",
                avatar: "James.jpg"
            }
        };

        function handleAdminLogin(event) {
            event.preventDefault();
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();

            // Profile matching gate
            if (user === "TristanAmadeo" && pass === "amadeotristanpetey8080") {
                runCinematicTransition("TristanAmadeo", pass);
            } else if (user === "JamesHilado" && pass === "JamesHilado") {
                runCinematicTransition("JamesHilado", pass);
            } else {
                alert("Security Authorization Rejected: Invalid Admin credentials.");
            }
        }

        function runCinematicTransition(userKey, passToken) {
            activeSessionToken = passToken;
            const profile = profiles[userKey];

            // 1. Fade away the initial static login card container viewport cleanly
            const authViewport = document.getElementById('authViewport');
            authViewport.style.opacity = "0";

            setTimeout(() => {
                authViewport.style.display = "none";
                
                // 2. Setup the Splash Welcome card components inside the screen center
                const welcomeOverlay = document.getElementById('welcomeOverlay');
                const welcomeAvatar = document.getElementById('welcomeAvatar');
                const welcomeText = document.getElementById('welcomeText');

                welcomeAvatar.innerHTML = `<img src="${profile.avatar}" alt="${profile.name}">`;
                welcomeText.innerHTML = `<h2>Warm Welcome, ${profile.name}!</h2><p>${profile.title}</p>`;
                
                welcomeOverlay.style.display = "flex";

                // 3. TRIGGER CINEMATIC MORPH: Shift profile elements up into the top-left banner layout corner smoothly
                setTimeout(() => {
                    // Smoothly animate the sizing scales and styles down to absolute dimensions
                    welcomeAvatar.style.width = "50px";
                    welcomeAvatar.style.height = "50px";
                    welcomeAvatar.style.borderWidth = "2px";
                    welcomeAvatar.style.boxShadow = "0 2px 8px rgba(0,0,0,0.1)";
                    
                    // Transform font layout structures into an elegant horizontal header look
                    welcomeText.style.textAlign = "left";
                    welcomeText.innerHTML = `
                        <h4 style="margin:0; font-family:'Fredoka One',sans-serif; font-size:1.1rem; color:var(--chocolate-main);">${profile.name}</h4>
                        <p style="margin:0; font-size:0.8rem; color:#a69285; font-weight:700;">${profile.title}</p>
                    `;

                    // Reposition coordinates over the backdrop to line up seamlessly over the hidden dynamic tracking banner
                    welcomeAvatar.style.transform = `translate(calc(-50vw + 60px), calc(-50vh + 45px))`;
                    welcomeText.style.transform = `translate(calc(-50vw + 245px), calc(-50vh + 45px))`;
                    
                    // Fade standard welcome screen background out to match the dynamic tracking banner structure
                    welcomeOverlay.style.transition = "background-color 0.85s ease";
                    welcomeOverlay.style.backgroundColor = "rgba(255, 252, 247, 0)";

                    // 4. Reveal structural content grid and background banner concurrently
                    setTimeout(() => {
                        welcomeOverlay.style.display = "none"; // Clean structural footprint
                        
                        // Append elements cleanly directly inside permanent brand container tree
                        const brandCluster = document.getElementById('headerBrandCluster');
                        brandCluster.appendChild(welcomeAvatar);
                        brandCluster.appendChild(welcomeText);
                        
                        // Reset dynamic style offsets instantly inside the document space flow
                        welcomeAvatar.style.transform = "none";
                        welcomeText.style.transform = "none";

                        // Animate system interfaces smoothly up to 100% visibility parameters
                        const dynamicHeader = document.getElementById('dynamicHeader');
                        const dashboardViewport = document.getElementById('dashboardViewport');
                        
                        dynamicHeader.style.display = "flex";
                        dashboardViewport.style.display = "block";
                        
                        // Trigger CSS transitions
                        setTimeout(() => {
                            dynamicHeader.style.opacity = "1";
                            dashboardViewport.style.opacity = "1";
                            fetchOrderDatabase(); // Populate grid view data records async
                        }, 50);

                    }, 850); // Matches the vector translation transition timelines
                }, 2200); // Amount of time the user is presented with the central splash greeting card

            }, 500); // Matches the login box initial fade-out delay
        }

        function fetchOrderDatabase() {
            const tbody = document.getElementById('orderTableBody');
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#a69285; font-style:italic; padding:40px;">📂 Syncing live cloud transactions data map...</td></tr>`;

            fetch(`${CHOCOPUFF_SMS_API_BASE}/api/admin/orders`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-auth': activeSessionToken
                }
            })
            .then(res => {
                if (!res.ok) throw new Error("Unauthorized data stream token or network link drop.");
                return res.json();
            })
            .then(data => {
                tbody.innerHTML = "";

                if (!data.orders || data.orders.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#a69285; font-style:italic; padding:40px;">No operational storefront records found in system memory.</td></tr>`;
                    return;
                }

                data.orders.forEach((order, index) => {
                    let itemsHtml = '<ul style="margin:0; padding-left:15px; font-weight:700;">';
                    if (Array.isArray(order.items)) {
                        order.items.forEach(item => {
                            itemsHtml += `<li style="margin-bottom:4px;">🍫 ${item.title || item.name} <span style="color:#a69285; font-size:0.85rem;">(Qty: ${item.quantity})</span></li>`;
                        });
                    }
                    itemsHtml += '</ul>';

                    const formattedTotal = order.total ? `₱${parseFloat(order.total).toFixed(2)}` : '₱0.00';
                    const statusClass = order.status === 'preparing' ? 'status-preparing' : 'status-delivery';
                    const statusText = order.status === 'preparing' ? 'Preparing' : 'Out For Delivery';
                    const iconText = order.status === 'preparing' ? '<i class="fa-solid fa-fire-burner"></i>' : '<i class="fa-solid fa-motorcycle"></i>';

                    const row = document.createElement('tr');
                    // Inject an elegant staggered layout line-by-line cascade delay 
                    row.style.animation = `tableRowEntrance 0.4s cubic-bezier(0.23, 1, 0.32, 1) ${index * 0.06}s forwards`;
                    
                    row.innerHTML = `
                        <td><span class="order-id-tag">${order.id}</span></td>
                        <td>
                            <strong style="font-size:1.05rem;">${order.name}</strong><br>
                            <span style="color:#a69285; font-size:0.85rem; font-weight:700;"><i class="fa-solid fa-phone" style="font-size:0.75rem; margin-right:3px;"></i> ${order.phone}</span>
                        </td>
                        <td style="font-weight:600; font-size:0.95rem; line-height:1.4;">
                            ${order.address}<br>
                            <span style="color:#a69285; font-size:0.85rem; font-weight:700;"><i class="fa-solid fa-location-dot" style="font-size:0.75rem; margin-right:3px;"></i> ${order.city || ''} ${order.zip || ''}</span>
                        </td>
                        <td>${itemsHtml}</td>
                        <td>
                            <strong style="color:var(--chocolate-main); font-size:1.1rem;">${formattedTotal}</strong><br>
                            <span style="font-size:0.8rem; color:#a69285; font-weight:700; text-transform:uppercase;"><i class="fa-solid fa-credit-card" style="font-size:0.75rem;"></i> ${order.paymentMethod || 'COD'}</span>
                        </td>
                        <td><span class="status-badge ${statusClass}">${iconText} ${statusText}</span></td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(err => {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#cc3333; font-style:italic; font-weight:700; padding:40px;">❌ Error processing fetch layout hook: ${err.message}</td></tr>`;
            });
        }
    </script>
</body>
</html>
