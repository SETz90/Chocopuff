<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chocopuff | Executive Command Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --chocolate-main: #8b5c1a;
            --chocolate-dark: #5c3a21;
            --cream-bg: #fffcf7;
            --white: #ffffff;
            --accent-pink: #ffb7b2;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--cream-bg);
            background-image: radial-gradient(rgba(139, 92, 26, 0.04) 2px, transparent 0);
            background-size: 30px 30px;
            color: var(--chocolate-dark);
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* BACKGROUND TOPPING DECORATIONS SYSTEM */
        .topping-particle {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            opacity: 0.25;
            animation: floatingDrift 8s ease-in-out infinite alternate;
        }
        @keyframes floatingDrift {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-25px) rotate(15deg); }
        }

        /* ANIMATIONS & TRANSITIONS */
        @keyframes zoomFadeIn {
            from { opacity: 0; transform: scale(0.93) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes subtleGlowPulse {
            from { box-shadow: 0 12px 40px rgba(139,92,26,0.1); }
            to { box-shadow: 0 12px 40px rgba(139,92,26,0.22); }
        }
        @keyframes spinIcon {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rowSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOGIN SCREEN PANELS */
        .auth-viewport {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
            position: relative;
            transition: opacity 0.4s ease-out;
        }
        .auth-card {
            background: var(--white);
            padding: 45px 35px;
            border-radius: 32px;
            border: 4px solid var(--chocolate-main);
            width: 100%;
            max-width: 430px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(139,92,26,0.15);
            animation: zoomFadeIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px;
            background: linear-gradient(90deg, #8b5c1a, #ffb7b2, #5c3a21);
        }
        .auth-card i.lock-icon {
            font-size: 3.5rem; color: var(--chocolate-main); margin-bottom: 10px;
        }
        .auth-card h2 {
            font-family: 'Fredoka One', sans-serif; color: var(--chocolate-main);
            margin: 0 0 5px 0; font-size: 2rem;
        }
        .auth-card p { color: #7a6252; margin: 0 0 25px 0; font-weight: 700; }
        
        .input-group { position: relative; margin-bottom: 22px; }
        .input-group i {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: #a69285; font-size: 1.1rem; transition: color 0.2s;
        }
        .input-group input {
            width: 100%; padding: 15px 15px 15px 48px;
            border: 2px solid rgba(139,92,26,0.25); border-radius: 16px;
            box-sizing: border-box; font-size: 1rem; font-family: 'Quicksand', sans-serif;
            font-weight: 700; background-color: #fffdfb; color: var(--chocolate-dark);
            transition: all 0.25s ease-in-out;
        }
        .input-group input:focus {
            outline: none; border-color: var(--chocolate-main);
            box-shadow: 0 0 0 4px rgba(139,92,26,0.12);
        }
        .input-group input:focus + i { color: var(--chocolate-main); }
        
        .login-btn {
            width: 100%; background-color: var(--chocolate-main); color: var(--white);
            border: none; padding: 16px; font-weight: 700; border-radius: 16px;
            cursor: pointer; font-size: 1.15rem; font-family: 'Quicksand', sans-serif;
            transition: all 0.2s ease-in-out; box-shadow: 0 6px 16px rgba(139,92,26,0.25);
            margin-bottom: 15px;
        }
        .login-btn:hover { background-color: var(--chocolate-dark); transform: translateY(-2px); }

        /* BIOMETRIC FACIAL RECOGNITION BUTTONS */
        .face-id-btn {
            background: none; border: 2px dashed var(--chocolate-main); color: var(--chocolate-main);
            padding: 12px; border-radius: 14px; width: 100%; font-family: 'Quicksand', sans-serif;
            font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: all 0.2s;
            margin-bottom: 10px;
        }
        .face-id-btn:hover { background: rgba(139, 92, 26, 0.05); transform: scale(1.01); }

        .setup-biometric-link {
            font-size: 0.85rem; color: #a69285; cursor: pointer; text-decoration: underline;
            font-weight: 700; display: inline-block; margin-top: 5px;
        }
        .setup-biometric-link:hover { color: var(--chocolate-main); }

        /* WARM WELCOME FILM TRANSITION OVERLAY */
        .welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--cream-bg); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .welcome-avatar-wrapper {
            width: 240px; height: 240px;
            border-radius: 50%; border: 8px solid var(--chocolate-main);
            background: var(--white); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 45px rgba(139,92,26,0.2);
            transition: all 0.9s cubic-bezier(0.76, 0, 0.24, 1);
        }
        .welcome-avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .welcome-text {
            margin-top: 35px; text-align: center;
            transition: opacity 0.4s cubic-bezier(0.76, 0, 0.24, 1);
        }
        .welcome-text h2 {
            font-family: 'Fredoka One', sans-serif; color: var(--chocolate-main);
            font-size: 2.5rem; margin: 0 0 10px 0; padding: 0 15px;
        }
        .welcome-text p { font-size: 1.25rem; color: #7a6252; margin: 0; font-weight: 700; }

        /* MAIN CONTAINER MASTER DASHBOARD STYLES */
        .dashboard-viewport {
            max-width: 1300px; margin: 0 auto;
            padding: 140px 15px 40px 15px;
            box-sizing: border-box; opacity: 0; display: none;
            transition: opacity 0.6s ease-out; z-index: 5; position: relative;
        }
        
        /* UPDATED HEADER: Responsive bar mechanics preventing clipping */
        .dynamic-header {
            position: fixed; top: 0; left: 0; right: 0; min-height: 90px;
            background: rgba(255, 252, 247, 0.96); backdrop-filter: blur(16px);
            border-bottom: 4px solid var(--chocolate-main); z-index: 998;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 24px; box-sizing: border-box; opacity: 0;
            transition: opacity 0.5s ease-out; flex-wrap: wrap; gap: 15px;
        }
        
        .profile-brand-cluster { 
            display: flex; 
            align-items: center; 
            gap: 14px;
        }
        .profile-brand-cluster .text-node {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .refresh-btn {
            background-color: var(--chocolate-main); color: var(--white); border: 3px solid var(--chocolate-dark);
            padding: 10px 20px; font-weight: 700; border-radius: 14px; cursor: pointer; font-size: 0.95rem;
            font-family: 'Quicksand', sans-serif; transition: all 0.25s ease-in-out; display: flex;
            align-items: center; gap: 8px; box-shadow: 0 6px 14px rgba(139,92,26,0.15);
        }
        .refresh-btn:hover {
            background-color: var(--chocolate-dark); box-shadow: 0 4px 8px rgba(139,92,26,0.2); transform: translateY(-2px);
        }
        
        /* MOBILE RESPONSIVE SWIPE BOX */
        .table-wrapper {
            background: var(--white); border-radius: 24px; border: 4px solid var(--chocolate-main);
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            box-shadow: 0 15px 45px rgba(139,92,26,0.08); animation: subtleGlowPulse 2.5s ease-in-out alternate infinite;
            margin-top: 10px;
        }
        
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 850px; }
        th {
            background-color: var(--chocolate-main); color: var(--white); font-weight: 700; font-size: 1rem; padding: 18px 15px;
            font-family: 'Fredoka One', sans-serif; letter-spacing: 0.5px; white-space: nowrap;
        }
        td { padding: 18px 15px; border-bottom: 1px solid rgba(139,92,26,0.1); vertical-align: top; }
        
        .order-id-tag {
            background: #f4eae1; padding: 6px 12px; border-radius: 10px;
            font-weight: 700; color: var(--chocolate-dark); border: 2px solid rgba(139,92,26,0.15);
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; white-space: nowrap;
        }
        .status-preparing { background-color: #ffe6cc; color: #b35900; }
        .status-delivery { background-color: #d1e7dd; color: #0f5132; }

        .item-badge-list { margin: 0; padding: 0; list-style-type: none; min-width: 180px; }
        .item-badge-list li {
            background: var(--cream-bg); border: 1px solid rgba(139,92,26,0.1);
            padding: 6px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 0.9rem; font-weight: 700;
        }
        
        .rotating-icon { animation: spinIcon 0.8s linear infinite; }

        /* RESPONSIVE MEDIA BREAKPOINTS */
        @media (max-width: 600px) {
            .dynamic-header {
                justify-content: center;
                text-align: center;
                padding: 15px;
            }
            .profile-brand-cluster {
                flex-direction: column;
                gap: 8px;
            }
            .refresh-btn {
                width: 100%;
                justify-content: center;
            }
            .dashboard-viewport {
                padding-top: 190px;
            }
        }
    </style>
</head>
<body>

    <div class="topping-particle" style="top: 15%; left: 8%; font-size: 3rem; animation-delay: 0s;">☁️</div>
    <div class="topping-particle" style="top: 45%; left: 4%; font-size: 2.5rem; animation-delay: 1s;">🫘</div>
    <div class="topping-particle" style="top: 75%; left: 9%; font-size: 2.8rem; animation-delay: 0.5s;">🍪</div>
    <div class="topping-particle" style="top: 20%; right: 7%; font-size: 2.6rem; animation-delay: 1.5s;">🫘</div>
    <div class="topping-particle" style="top: 60%; right: 5%; font-size: 3.2rem; animation-delay: 0.2s;">☁️</div>

    <div id="authViewport" class="auth-viewport">
        <div class="auth-card">
            <i class="fa-solid fa-cookie-bite lock-icon"></i>
            <h2>Chocopuff Hub</h2>
            <p>Administrative Database Portal</p>
            
            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="input-group">
                    <input type="text" id="usernameInput" placeholder="System Username" required autocomplete="username">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder="Secure Access Pin" required autocomplete="current-password">
                    <i class="fa-solid fa-unlock-keyhole"></i>
                </div>
                <button type="submit" class="login-btn">Authenticate Console</button>
                
                <button type="button" class="face-id-btn" onclick="triggerBiometricFaceID()">
                    <i class="fa-solid fa-face-id"></i> Fast Sign-In with Face ID
                </button>
                
                <span class="setup-biometric-link" onclick="registerBiometricDevice()">First time? Setup device Face ID</span>
            </form>
        </div>
    </div>

    <div id="welcomeOverlay" class="welcome-overlay">
        <div id="welcomeAvatar" class="welcome-avatar-wrapper"></div>
        <div id="welcomeText" class="welcome-text"></div>
    </div>

    <div id="dynamicHeader" class="dynamic-header">
        <div id="headerBrandCluster" class="profile-brand-cluster"></div>
        <button id="syncButton" class="refresh-btn" onclick="fetchOrderDatabase()">
            <i id="syncIcon" class="fa-solid fa-rotate"></i> Sync Live Data
        </button>
    </div>

    <div id="dashboardViewport" class="dashboard-viewport">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Reference</th>
                        <th>Profile Account</th>
                        <th>Delivery Coordinates</th>
                        <th>Manifest Request</th>
                        <th>Financial Settlement</th>
                        <th>System State</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const CHOCOPUFF_SMS_API_BASE = "https://chocopuff.onrender.com"; 
        let activeSessionToken = "";

        const profiles = {
            TristanAmadeo: {
                name: "Tristan Amadeo",
                title: "CEO & Founder",
                avatar: "Tristan.jpg"
            },
            JamesHilado: {
                name: "James Hilado",
                title: "COO & Academic Director",
                avatar: "James.jpg"
            }
        };

        const bufferToBase64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
        const base64ToBuffer = base64 => Uint8Array.from(atob(base64), c => c.charCodeAt(0));

        // 1. BIOMETRIC REGISTRATION
        async function registerBiometricDevice() {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();

            if (!user || !pass) {
                alert("Please fill out your Username and Password first so we know who to link Face ID to!");
                return;
            }
            if ((user === "TristanAmadeo" && pass === "amadeotristanpetey8080") || (user === "JamesHilado" && pass === "JamesHilado")) {
                if (!window.PublicKeyCredential) {
                    alert("WebAuthn Biometrics are not supported on this browser version.");
                    return;
                }

                try {
                    const challenge = new Uint8Array(32);
                    window.crypto.getRandomValues(challenge);
                    const userId = new Uint8Array(16);
                    window.crypto.getRandomValues(userId);

                    const createCredentialOptions = {
                        challenge: challenge,
                        rp: { name: "Chocopuff Admin Hub", id: window.location.hostname },
                        user: {
                            id: userId,
                            name: user,
                            displayName: profiles[user].name
                        },
                        pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                        authenticatorSelection: {
                            authenticatorAttachment: "platform",
                            userVerification: "required"
                        },
                        timeout: 60000
                    };

                    const credential = await navigator.credentials.create({ publicKey: createCredentialOptions });
                    
                    if (credential) {
                        localStorage.setItem(`chocopuff_biometric_user`, user);
                        localStorage.setItem(`chocopuff_biometric_pass`, pass);
                        localStorage.setItem(`chocopuff_biometric_id`, bufferToBase64(credential.rawId));
                        
                        alert(`🎉 Face ID successfully registered on this device for ${profiles[user].name}! You can now use Fast Sign-In.`);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Device biometric registration failed: " + err.message);
                }
            } else {
                alert("Invalid username/password credentials. Cannot bind biometrics.");
            }
        }

        // 2. BIOMETRIC LOGIN SCAN
        async function triggerBiometricFaceID() {
            const savedUserIdBase64 = localStorage.getItem('chocopuff_biometric_id');
            const savedUserKey = localStorage.getItem('chocopuff_biometric_user');
            const savedPasswordToken = localStorage.getItem('chocopuff_biometric_pass');

            if (!savedUserIdBase64 || !savedUserKey) {
                alert("No Face ID profile registered on this device yet. Please fill in credentials and click 'Setup device Face ID' below first.");
                return;
            }

            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                const credentialIdBuffer = base64ToBuffer(savedUserIdBase64);

                const assertionOptions = {
                    challenge: challenge,
                    rpId: window.location.hostname,
                    allowCredentials: [{
                        type: "public-key",
                        id: credentialIdBuffer
                    }],
                    userVerification: "required",
                    timeout: 60000
                };

                const assertion = await navigator.credentials.get({ publicKey: assertionOptions });
                
                if (assertion) {
                    runCinematicTransition(savedUserKey, savedPasswordToken);
                }
            } catch (err) {
                console.error(err);
                alert("Biometric verification canceled or rejected.");
            }
        }

        function handleAdminLogin(event) {
            event.preventDefault();
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();

            if (user === "TristanAmadeo" && pass === "amadeotristanpetey8080") {
                runCinematicTransition("TristanAmadeo", pass);
            } else if (user === "JamesHilado" && pass === "JamesHilado") {
                runCinematicTransition("JamesHilado", pass);
            } else {
                alert("Security Credentials Rejected. Access Denied.");
            }
        }

        function runCinematicTransition(userKey, passToken) {
            activeSessionToken = passToken;
            const profile = profiles[userKey];

            const authViewport = document.getElementById('authViewport');
            authViewport.style.opacity = "0";

            setTimeout(() => {
                authViewport.style.display = "none";
                
                const welcomeOverlay = document.getElementById('welcomeOverlay');
                const welcomeAvatar = document.getElementById('welcomeAvatar');
                const welcomeText = document.getElementById('welcomeText');

                welcomeAvatar.innerHTML = `<img src="${profile.avatar}" alt="${profile.name}" onerror="this.src='https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/img/user2-160x160.jpg'">`;
                welcomeText.innerHTML = `<h2>Warm Welcome, ${profile.name}!</h2><p>${profile.title}</p>`;
                
                welcomeOverlay.style.display = "flex";

                setTimeout(() => {
                    welcomeText.style.opacity = "0";

                    setTimeout(() => {
                        welcomeAvatar.style.width = "56px";
                        welcomeAvatar.style.height = "56px";
                        welcomeAvatar.style.borderWidth = "3px";
                        
                        // Check if phone or desktop for the animation end positions
                        const isMobile = window.innerWidth <= 600;
                        if(isMobile) {
                            welcomeAvatar.style.transform = `translate(0px, calc(-50vh + 60px))`;
                        } else {
                            welcomeAvatar.style.transform = `translate(calc(-50vw + 72px), calc(-50vh + 55px))`;
                        }
                        
                        welcomeOverlay.style.transition = "background-color 0.85s ease";
                        welcomeOverlay.style.backgroundColor = "rgba(255, 252, 247, 0)";

                        setTimeout(() => {
                            welcomeOverlay.style.display = "none";
                            
                            const brandCluster = document.getElementById('headerBrandCluster');
                            brandCluster.appendChild(welcomeAvatar);
                            
                            const textNode = document.createElement('div');
                            textNode.className = "text-node";
                            textNode.innerHTML = `
                                <h4 style="margin:0; font-family:'Fredoka One',sans-serif; font-size:1.25rem; color:var(--chocolate-main); line-height:1.2;">${profile.name}</h4>
                                <p style="margin:0; font-size:0.85rem; color:#a69285; font-weight:700;">${profile.title}</p>
                            `;
                            brandCluster.appendChild(textNode);
                            
                            welcomeAvatar.style.transform = "none";

                            const dynamicHeader = document.getElementById('dynamicHeader');
                            const dashboardViewport = document.getElementById('dashboardViewport');
                            
                            dynamicHeader.style.display = "flex";
                            dashboardViewport.style.display = "block";
                            
                            setTimeout(() => {
                                dynamicHeader.style.opacity = "1";
                                dashboardViewport.style.opacity = "1";
                                fetchOrderDatabase(); 
                            }, 50);

                        }, 850); 
                    }, 400);
                }, 2000); 
            }, 400);
        }

        function fetchOrderDatabase() {
            const syncIcon = document.getElementById('syncIcon');
            const tbody = document.getElementById('orderTableBody');
            
            if (syncIcon) syncIcon.classList.add('rotating-icon');

            fetch(`${CHOCOPUFF_SMS_API_BASE}/api/admin/orders`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-auth': activeSessionToken
                }
            })
            .then(res => {
                if (!res.ok) throw new Error("Server data map sync failure.");
                return res.json();
            })
            .then(data => {
                tbody.innerHTML = "";

                if (!data.orders || data.orders.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#a69285; font-style:italic; padding:40px; font-weight:700;">📥 Standing by... No incoming storefront orders currently in memory.</td></tr>`;
                    return;
                }

                data.orders.forEach((order, index) => {
                    let itemsHtml = '<ul class="item-badge-list">';
                    if (Array.isArray(order.items)) {
                        order.items.forEach(item => {
                            itemsHtml += `<li>🍫 ${item.title || item.name} <span style="color:var(--chocolate-main);">x${item.quantity}</span></li>`;
                        });
                    }
                    itemsHtml += '</ul>';

                    const formattedTotal = order.total ? `₱${parseFloat(order.total).toFixed(2)}` : '₱0.00';
                    const statusClass = order.status === 'preparing' ? 'status-preparing' : 'status-delivery';
                    const statusText = order.status === 'preparing' ? 'Preparing' : 'Out For Delivery';
                    const statusIcon = order.status === 'preparing' ? '<i class="fa-solid fa-fire-burner"></i>' : '<i class="fa-solid fa-motorcycle"></i>';

                    const row = document.createElement('tr');
                    row.style.animation = `rowSlideUp 0.4s ease-out ${index * 0.05}s forwards`;
                    
                    row.innerHTML = `
                        <td><span class="order-id-tag">#${order.id}</span></td>
                        <td>
                            <strong style="font-size:1.05rem;">${order.name}</strong><br>
                            <span style="color:#a69285; font-size:0.85rem; font-weight:700;"><i class="fa-solid fa-phone"></i> ${order.phone}</span>
                        </td>
                        <td style="font-weight:600; font-size:0.95rem; line-height:1.4;">
                            ${order.address}<br>
                            <span style="color:#a69285; font-size:0.85rem;">${order.city || ''} ${order.zip || ''}</span>
                        </td>
                        <td>${itemsHtml}</td>
                        <td>
                            <strong style="color:var(--chocolate-main); font-size:1.1rem;">${formattedTotal}</strong><br>
                            <span style="font-size:0.8rem; color:#a69285; font-weight:700; text-transform:uppercase;"><i class="fa-solid fa-wallet"></i> ${order.paymentMethod || 'COD'}</span>
                        </td>
                        <td><span class="status-badge ${statusClass}">${statusIcon} ${statusText}</span></td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(err => {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#cc3333; font-weight:700; padding:40px;">❌ System Sync Offline.</td></tr>`;
            })
            .finally(() => {
                if (syncIcon) {
                    setTimeout(() => { syncIcon.classList.remove('rotating-icon'); }, 600);
                }
            });
        }
    </script>
</body>
</html>
